<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  width: 300px;
  padding: 16px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px;
  background: #1a1d23;
  color: #e8eaef;
}
h1 { font-size: 16px; margin: 0 0 12px; }
label { display: block; font-size: 11px; color: #9198a5; margin: 8px 0 4px; }
select, input {
  width: 100%;
  padding: 6px 8px;
  background: #252830;
  border: 1px solid #374151;
  border-radius: 4px;
  color: #e8eaef;
  font-size: 12px;
  font-family: inherit;
}
select:focus, input:focus {
  outline: none;
  border-color: #4f7be8;
}
button {
  width: 100%;
  margin-top: 12px;
  padding: 8px;
  background: #4f7be8;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}
button:hover { background: #3d65cc; }
.saved { color: #22c55e; font-size: 11px; margin-top: 8px; display: none; text-align: center; }
</style>
</head>
<body>
<h1>LibrAA Translator</h1>

<label>Provider</label>
<select id="provider">
  <option value="openai">OpenAI</option>
  <option value="gemini">Google Gemini</option>
  <option value="claude">Claude</option>
  <option value="ollama">Ollama (로컬)</option>
</select>

<div id="apikey-row">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="API Key">
</div>

<label>Model</label>
<input type="text" id="model" placeholder="gpt-4.1-mini">

<label>Concurrency</label>
<select id="concurrency">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3" selected>3</option>
  <option value="5">5</option>
  <option value="8">8</option>
  <option value="10">10</option>
</select>

<label>Target Language</label>
<select id="targetLang">
  <option value="ko">한국어</option>
  <option value="en">English</option>
  <option value="ja">日本語</option>
</select>

<button id="save">저장</button>
<div class="saved" id="saved">✓ 저장됨</div>

<script src="popup.js"></script>
</body>
</html>
